name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Type check
        run: npx tsc -b
      - name: Lint
        run: npm run lint --if-present
        continue-on-error: true
      - name: Unit tests
        run: npm test
      - name: Build
        run: npm run build
        env:
          # Dummy values so `import.meta.env` checks pass; never used at runtime in CI build.
          VITE_FIREBASE_API_KEY: ci-dummy
          VITE_FIREBASE_AUTH_DOMAIN: ci-dummy.firebaseapp.com
          VITE_FIREBASE_DATABASE_URL: https://ci-dummy-default-rtdb.firebaseio.com
          VITE_FIREBASE_PROJECT_ID: ci-dummy
          VITE_FIREBASE_APP_ID: 1:000:web:000

  rules-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - run: npm ci
      - name: Install Firebase CLI
        run: npm i -g firebase-tools
      - name: Run rules tests against emulator
        run: firebase emulators:exec --only database --project yapp-ci "npm run test:rules"
